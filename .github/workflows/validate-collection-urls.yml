name: Validate Collection URLs

on:
  push:
    paths:
      - "collections/**/*.json"
      - ".github/workflows/validate-collection-urls.yml"
  pull_request:
    paths:
      - "collections/**/*.json"
      - ".github/workflows/validate-collection-urls.yml"
  workflow_dispatch:

jobs:
  validate-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract URLs from collection catalogs
        shell: bash
        run: |
          python3 <<'PY' > urls.txt
          import json
          from pathlib import Path

          urls = []

          def walk(value):
              if isinstance(value, dict):
                  for key, item in value.items():
                      if key == "url" and isinstance(item, str) and item.startswith(("http://", "https://")):
                          urls.append(item)
                      else:
                          walk(item)
              elif isinstance(value, list):
                  for item in value:
                      walk(item)

          for path in sorted(Path("collections").rglob("*.json")):
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"::warning file={path}::Could not parse JSON: {exc}")
                  continue
              walk(data)

          for url in sorted(set(urls)):
              print(url)
          PY

          echo "URLs encontradas: $(wc -l < urls.txt)"

      - name: Validate URLs as advisory report
        shell: bash
        run: |
          set +e

          TOTAL=0
          OK=0
          WARN=0
          FAIL=0

          echo "# Relatório de validação de URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | URL | Observação |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            TOTAL=$((TOTAL + 1))

            echo "Checking: $URL ..."

            # Tenta HEAD primeiro para não baixar arquivos grandes.
            curl -fsSLI --max-time 30 --retry 2 --retry-delay 2 "$URL" >/dev/null 2>&1
            CODE=$?

            if [ "$CODE" -eq 0 ]; then
              echo "OK: $URL"
              OK=$((OK + 1))
              echo "| OK | $URL | HEAD respondeu com sucesso |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Fallback com Range 0-0 para servidores que não aceitam HEAD.
            curl -fsSL --range 0-0 --max-time 30 --retry 2 --retry-delay 2 "$URL" >/dev/null 2>&1
            CODE=$?

            if [ "$CODE" -eq 0 ]; then
              echo "OK via range fallback: $URL"
              OK=$((OK + 1))
              echo "| OK | $URL | GET parcial respondeu com sucesso |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Mantemos como warning porque o fork brasileiro não deve quebrar por links legados do catálogo original.
            echo "::warning::URL não validada: $URL (curl exit code $CODE)"
            WARN=$((WARN + 1))
            echo "| AVISO | $URL | curl exit code $CODE |" >> "$GITHUB_STEP_SUMMARY"
          done < urls.txt

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Resumo" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total de URLs: $TOTAL" >> "$GITHUB_STEP_SUMMARY"
          echo "- URLs OK: $OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- Avisos: $WARN" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Este workflow é consultivo/advisory e não bloqueia o desenvolvimento do Project N.O.M.A.D. Brasil por URLs externas instáveis ou legadas." >> "$GITHUB_STEP_SUMMARY"

          echo "Validação consultiva concluída. Total=$TOTAL OK=$OK Avisos=$WARN"

          # Importante: não falhar o workflow enquanto estivermos mantendo catálogos brasileiros e legados em paralelo.
          exit 0
